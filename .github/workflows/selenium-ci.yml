name: Selenium Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # ✅ FIX: tách riêng step
    - name: Wait for Selenium
      run: sleep 10

    - name: Install Firefox
      run: sudo apt-get update && sudo apt-get install -y firefox

    - name: Run tests
      run: |
        cd b1_SeleniumFramework
        mvn clean test \
        -Dbrowser=${{ matrix.browser }} \
        -Denv=dev \
        -Dusername=${{ secrets.TEST_USERNAME }} \
        -Dpassword=${{ secrets.TEST_PASS }} \
        -DsuiteXmlFile=testng-smoke.xml

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.browser }}
        path: |
          b1_SeleniumFramework/target/surefire-reports/
          b1_SeleniumFramework/target/screenshots/

          -- name: Generate Allure Report
          run: |
            cd b1_SeleniumFramework
            mvn allure:report
            -name: Upload Allure Report
            uses: actions/upload-artifact@v4
            with:
              name: allure-report
              path: b1_SeleniumFramework/target/allure-report/