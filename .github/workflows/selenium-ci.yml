name: Selenium Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Selenium Tests (CHROME ONLY)
        run: |
          cd b1_SeleniumFramework
          mvn clean test -Dbrowser=chrome -Dheadless=true
        env:
          CI: true

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-result
          path: b1_SeleniumFramework/target/

      - name: Generate Allure Report
        run: |
          cd b1_SeleniumFramework
          mvn allure:report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: b1_SeleniumFramework/target/site/allure-maven-plugin/