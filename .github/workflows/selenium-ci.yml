name: Selenium Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox] 
    services:
      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
    steps:
    - uses: actions/checkout@v4  # ✅ đúng đề


    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
      - name: wait for selenium to be ready
        run: sleep 10
    # ✅ FIX: đảm bảo có firefox
    - name: Install Firefox
      run: sudo apt-get update && sudo apt-get install -y firefox
    - name: Run tests
      run: |
        cd b1_SeleniumFramework
        mvn clean test \
        -Dbrowser=${{ matrix.browser }} \
        -Denv=dev \
        -Dusername=${{ secrets.TEST_USERNAME }} \
        -Dpassword=${{ secrets.TEST_PASS }} \
        -DsuiteXmlFile=testng-smoke.xml

    # ✅ FIX: đúng path + đúng chuẩn chấm điểm
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.browser }}
        path: |
          b1_SeleniumFramework/target/surefire-reports/
          b1_SeleniumFramework/target/screenshots/